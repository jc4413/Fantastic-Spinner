<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Pro Spinner - Double or Nothing Fix</title>
    <style>
        :root { --primary: #8b5cf6; --bg: #0f172a; --panel: #1e293b; --text: #ffffff; }
        
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: var(--bg); color: var(--text); 
            display: flex; flex-direction: column; align-items: center; 
            margin: 0; padding: 0; min-height: 100vh;
            overflow-y: auto; 
            overflow-x: hidden;
        }

        #ui-wrapper { 
            display: flex; flex-direction: column; align-items: center; 
            width: 100%; max-width: 450px; padding: 20px; box-sizing: border-box; 
        }

        #wheel-container { 
            position: relative; width: 300px; height: 300px; 
            margin: 20px 0; display: flex; align-items: center; justify-content: center; 
        }

        canvas#wheel { 
            width: 100%; height: 100%; border-radius: 50%; 
            border: 6px solid #334155; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); 
            z-index: 1; 
        }

        #pointer { 
            position: absolute; top: -10px; left: 50%; transform: translateX(-50%); 
            width: 0; height: 0; border-left: 15px solid transparent; border-right: 15px solid transparent; 
            border-top: 30px solid #ff4757; z-index: 10; 
            transform-origin: 50% 0%;
            transition: transform 0.05s ease-out;
        }

        #center-hub { 
            position: absolute; width: 50px; height: 50px; background: white; 
            border-radius: 50%; border: 4px solid #334155; cursor: pointer; 
            z-index: 20; display: flex; align-items: center; justify-content: center; 
            color: #333; font-weight: 900; font-size: 10px; user-select: none;
        }

        .input-area { width: 100%; margin-top: 10px; padding-bottom: 80px; }
        textarea { 
            width: 100%; height: 100px; padding: 12px; border-radius: 12px; 
            border: 1px solid rgba(128, 128, 128, 0.3); 
            background: var(--panel); color: var(--text); font-size: 16px; 
            box-sizing: border-box; resize: none; margin-bottom: 10px;
        }

        #spin-btn { 
            width: 100%; padding: 18px; border-radius: 12px; border: none; 
            background: var(--primary); color: white; font-weight: bold; font-size: 18px; cursor: pointer; 
        }

        #win-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 200; align-items: center; justify-content: center; }
        .win-card { background: white; color: #1e293b; padding: 30px; border-radius: 20px; text-align: center; width: 85%; max-width: 320px; }
        
        #don-btn { margin-top: 15px; padding: 12px 20px; color: white; border: none; border-radius: 8px; font-weight: 800; cursor: pointer; display: none; }
        #confetti-canvas { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; pointer-events: none; z-index: 201; }
        #cd-panel { display: none; position: fixed; top: 10%; left: 50%; transform: translateX(-50%); background: var(--panel); padding: 20px; border-radius: 15px; border: 2px solid var(--primary); z-index: 300; width: 80%; max-width: 300px; }
    </style>
</head>
<body onclick="initAudio()">

<canvas id="confetti-canvas"></canvas>

<div id="ui-wrapper">
    <div id="wheel-container">
        <div id="pointer"></div>
        <div id="center-hub" onclick="handleCenterTap()">SPIN</div>
        <canvas id="wheel" width="600" height="600"></canvas>
    </div>

    <div class="input-area">
        <textarea id="namesList" oninput="drawWheel()">Alex&#10;Jordan&#10;Taylor&#10;Casey&#10;Riley</textarea>
        <button id="spin-btn" onclick="spin()">SPIN THE WHEEL</button>
    </div>
</div>

<div id="cd-panel">
    <h3 style="margin:0">Override</h3>
    <input type="text" id="rigCmd" placeholder="Commands..." style="width:100%; padding:8px; margin:10px 0; background:#000; color:#fff;">
    <button onclick="applyAndClose()" style="width:100%; background:var(--primary); color:white; border:none; padding:10px; border-radius:5px;">Apply</button>
</div>

<div id="win-overlay" onclick="closeWinner()">
    <div class="win-card" onclick="event.stopPropagation()">
        <h1 id="winner-name" style="font-size: 36px; margin: 0;">---</h1>
        <p id="winner-msg" style="margin: 10px 0; font-weight: bold; color: #64748b;">HAS WON!</p>
        <button id="don-btn" onclick="startDoubleOrNothing()">DOUBLE OR NOTHING?</button>
    </div>
</div>

<script>
    const canvas = document.getElementById('wheel');
    const ctx = canvas.getContext('2d');
    const namesArea = document.getElementById('namesList');
    const rigInput = document.getElementById('rigCmd');
    const pointerEl = document.getElementById('pointer');
    const confCanvas = document.getElementById('confetti-canvas');
    const confCtx = confCanvas.getContext('2d');
    
    let segments = [];
    let isSpinning = false;
    let rotation = 0;      
    let velocity = 0;      
    let friction = 0.993;  
    let lastTickIdx = -1;
    let activeCommand = ""; 
    let confettiParticles = [];
    let originalNames = "";
    let isDonMode = false;
    let tapCount = 0;
    let tapTimer;

    let audioCtx;
    const cheerAudio = new Audio('https://assets.mixkit.co/active_storage/sfx/2013/2013-preview.mp3');

    function initAudio() {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (audioCtx.state === 'suspended') audioCtx.resume();
    }

    function playTick() {
        if (!audioCtx) return;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'sine';
        osc.frequency.setValueAtTime(400, audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(10, audioCtx.currentTime + 0.04);
        gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.04);
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.start(); osc.stop(audioCtx.currentTime + 0.04);
        pointerEl.style.transform = "translateX(-50%) rotate(-15deg)";
        setTimeout(() => pointerEl.style.transform = "translateX(-50%) rotate(0deg)", 40);
    }

    function playCheer() {
        cheerAudio.play().catch(() => {
            const filter = audioCtx.createBiquadFilter();
            const noise = audioCtx.createBufferSource();
            const gain = audioCtx.createGain();
            const buffer = audioCtx.createBuffer(1, audioCtx.sampleRate * 2, audioCtx.sampleRate);
            const data = buffer.getChannelData(0);
            for (let i = 0; i < data.length; i++) data[i] = Math.random() * 2 - 1;
            noise.buffer = buffer; filter.type = 'lowpass'; filter.frequency.value = 1000;
            gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 1.5);
            noise.connect(filter); filter.connect(gain); gain.connect(audioCtx.destination);
            noise.start();
        });
    }

    function drawWheel() {
        const names = namesArea.value.split('\n').filter(t => t.trim() !== "");
        segments = names.map((n, i) => ({ 
            name: n.trim(), 
            color: ["#8b5cf6", "#ec4899", "#f59e0b", "#10b981", "#3b82f6", "#ef4444", "#fb923c", "#2dd4bf"][i % 8] 
        }));
        render();
    }

    function render() {
        const arc = (Math.PI * 2) / segments.length;
        ctx.clearRect(0, 0, 600, 600);
        segments.forEach((s, i) => {
            const angle = i * arc + rotation;
            ctx.beginPath();
            ctx.fillStyle = s.color; ctx.moveTo(300, 300);
            ctx.arc(300, 300, 290, angle, angle + arc);
            ctx.lineTo(300, 300); ctx.fill();
            ctx.save(); ctx.translate(300, 300); ctx.rotate(angle + arc/2);
            ctx.textAlign = "right"; ctx.fillStyle = "white"; ctx.font = "bold 24px sans-serif";
            ctx.fillText(s.name, 270, 10); ctx.restore();
        });
    }

    function spin() {
        if (isSpinning || segments.length === 0) return;
        initAudio();
        isSpinning = true;
        let winIndex = -1;
        const cmd = activeCommand.toLowerCase();
        
        if (cmd.startsWith('/alm')) {
            const target = cmd.replace('/alm', '').trim();
            const idx = segments.findIndex(s => s.name.toLowerCase() === target);
            if (idx !== -1) winIndex = (idx + 1) % segments.length;
        } else if (cmd.includes('_')) {
            const rigs = cmd.split(' ').filter(c => c.startsWith('/') && c.includes('_'));
            let roll = Math.random() * 100, cumulative = 0;
            for (let r of rigs) {
                const parts = r.substring(1).split('_');
                const idx = segments.findIndex(s => s.name.toLowerCase() === parts[0]);
                if (idx !== -1) {
                    cumulative += parseInt(parts[1]);
                    if (roll <= cumulative && winIndex === -1) winIndex = idx;
                }
            }
        }
        if (winIndex === -1) winIndex = Math.floor(Math.random() * segments.length);
        velocity = 0.5 + (Math.random() * 0.2); 
        animate();
    }

    function animate() {
        if (!isSpinning) return;
        rotation += velocity;
        velocity *= friction;
        const arcSize = (Math.PI * 2) / segments.length;
        const currentTickIdx = Math.floor(((Math.PI * 1.5) - (rotation % (Math.PI * 2)) + (Math.PI * 2)) % (Math.PI * 2) / arcSize);
        if (currentTickIdx !== lastTickIdx) { playTick(); lastTickIdx = currentTickIdx; }
        if (velocity < 0.0012) {
            velocity = 0; isSpinning = false;
            finalize();
        } else {
            render();
            requestAnimationFrame(animate);
        }
    }

    function finalize() {
        const arcSize = (Math.PI * 2) / segments.length;
        const normalized = (rotation % (Math.PI * 2) + (Math.PI * 2)) % (Math.PI * 2);
        const winIdx = Math.floor(((Math.PI * 1.5) - normalized + (Math.PI * 2)) % (Math.PI * 2) / arcSize);
        const winner = segments[winIdx % segments.length];
        
        playCheer();
        document.getElementById('winner-name').innerText = winner.name;
        document.getElementById('winner-name').style.color = winner.color;
        document.getElementById('don-btn').style.backgroundColor = winner.color;
        
        // Logical check for Double or Nothing mode
        if (isDonMode) {
            document.getElementById('don-btn').style.display = 'none';
            document.getElementById('winner-msg').innerText = "IS THE FINAL RESULT!";
        } else {
            document.getElementById('don-btn').style.display = 'inline-block';
            document.getElementById('winner-msg').innerText = "HAS WON!";
        }
        
        document.getElementById('win-overlay').style.display = 'flex';
        startConfetti();
    }

    function startDoubleOrNothing() {
        originalNames = namesArea.value;
        isDonMode = true;
        // Temporarily change wheel segments
        namesArea.value = "DOUBLE\nNOTHING\nDOUBLE\nNOTHING\nDOUBLE\nNOTHING\nDOUBLE\nNOTHING";
        drawWheel();
        document.getElementById('win-overlay').style.display = 'none';
        // Give a short delay then spin
        setTimeout(() => spin(), 500);
    }

    function closeWinner() {
        document.getElementById('win-overlay').style.display = 'none';
        cheerAudio.pause(); cheerAudio.currentTime = 0;
        if (isDonMode) {
            // Restore original list after the gamble is done
            namesArea.value = originalNames;
            isDonMode = false;
            drawWheel();
        }
    }

    function handleCenterTap() {
        tapCount++;
        clearTimeout(tapTimer);
        tapTimer = setTimeout(() => tapCount = 0, 500);
        if (tapCount >= 5) { document.getElementById('cd-panel').style.display = 'block'; tapCount = 0; }
        else if (!isSpinning) spin();
    }

    function applyAndClose() {
        activeCommand = rigInput.value.trim();
        rigInput.value = "";
        document.getElementById('cd-panel').style.display = 'none';
    }

    function startConfetti() {
        confCanvas.width = window.innerWidth;
        confCanvas.height = window.innerHeight;
        confettiParticles = [];
        const winnerColor = document.getElementById('winner-name').style.color;
        for (let i = 0; i < 80; i++) {
            confettiParticles.push({
                x: Math.random() * confCanvas.width, y: -20,
                size: Math.random() * 8 + 4, color: winnerColor,
                velY: Math.random() * 4 + 2, velX: Math.random() * 4 - 2, rot: Math.random() * 360
            });
        }
        animateConf();
    }

    function animateConf() {
        if (!confettiParticles.length) return;
        confCtx.clearRect(0,0,confCanvas.width, confCanvas.height);
        confettiParticles.forEach((p, i) => {
            p.y += p.velY; p.x += p.velX; p.rot += 5;
            confCtx.save(); confCtx.fillStyle = p.color; confCtx.translate(p.x, p.y);
            confCtx.rotate(p.rot * Math.PI/180);
            confCtx.fillRect(-p.size/2, -p.size/2, p.size, p.size);
            confCtx.restore();
            if (p.y > confCanvas.height) confettiParticles.splice(i, 1);
        });
        requestAnimationFrame(animateConf);
    }

    drawWheel();
</script>
</body>
</html>
